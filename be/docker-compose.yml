services:
  backend:
    build:
      context: .
      dockerfile: dockerfile
    restart: unless-stopped
    expose:
      - 8555
    ports:
      - "8555:8555"
    volumes:
      - ${GEOIP_HOST_DIR:-./data}:/app/data:ro
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - GEOIP_DB_PATH=${GEOIP_DB_PATH}
      - ROOT_DOMAIN=${ROOT_DOMAIN}
      - SECRET=${SECRET}
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8555"
